:root{--cream:#F5EEE3;--ink:#31302D;--blue:#7FCCF7;--grey:#C4BEB6}
*{margin:0;padding:0;box-sizing:border-box}
html{scrollbar-gutter:stable}
body{background:var(--cream);color:var(--ink);font-family:proxima-n-w01-reg,proxima-n-w05-reg,sans-serif}
a{color:inherit;text-decoration:none}
/* header — wordmark centered, SHOP/BOOK left, login+bag right (decorative) */
header{position:relative;max-width:1450px;margin:0 auto;height:150px}
nav.bk-nav{position:absolute;left:48px;top:38px;display:flex;gap:26px;font-size:16px;font-weight:700;letter-spacing:.06em}
nav.bk-nav a{color:var(--ink)}
nav.bk-nav a.here{color:var(--blue)}
.bk-mark{position:absolute;left:50%;top:26px;transform:translateX(-50%)}
.bk-mark img{width:400px;max-width:56vw;height:auto;display:block}
.bk-account{position:absolute;right:48px;top:34px;display:flex;align-items:center;gap:18px;font-size:14px;color:var(--ink)}
.bk-bag{position:relative;width:26px;height:30px}
.bk-bag svg{width:100%;height:100%;stroke:var(--blue);fill:none;stroke-width:2}
/* masonry (JS height-balanced columns) */
main{max-width:1240px;margin:14px auto 0;padding:0 20px}
.bk-grid{display:flex;gap:18px;align-items:flex-start}
.bk-col{flex:1;display:flex;flex-direction:column;gap:18px}
@media(max-width:620px){header{height:118px}nav.bk-nav{left:20px;top:20px}.bk-account{display:none}.bk-mark{top:64px}.bk-mark img{max-width:70vw}}
.bk-item{margin:0;position:relative}
.bk-shop{position:absolute;left:10px;bottom:10px;opacity:0;transition:opacity .25s;background:rgba(245,238,227,.95);color:var(--ink);font-size:11px;font-weight:700;letter-spacing:.14em;padding:9px 13px;text-decoration:none}
.bk-item:hover .bk-shop{opacity:1}
.bk-shop:hover{color:var(--blue)}
@media(hover:none){.bk-shop{opacity:1}}
.bk-item img{width:100%;height:auto;display:block;background:var(--grey);cursor:zoom-in;transition:opacity .25s}
.bk-item img:hover{opacity:.92}
/* modal carousel */
#bk-modal{display:none;position:fixed;inset:0;z-index:9000;background:rgba(245,238,227,.98);align-items:center;justify-content:center}
#bk-modal.open{display:flex}
#bk-modal img{max-width:86vw;max-height:82vh;object-fit:contain;box-shadow:0 8px 60px rgba(49,48,45,.18)}
.bk-x,.bk-prev,.bk-next{position:fixed;background:none;border:none;color:var(--ink);cursor:pointer;font-family:inherit;z-index:9002}
.bk-x{top:22px;right:30px;font-size:34px;line-height:1}
.bk-prev,.bk-next{top:50%;transform:translateY(-50%);font-size:52px;padding:18px}
.bk-prev{left:14px}.bk-next{right:14px}
.bk-prev:hover,.bk-next:hover,.bk-x:hover{color:var(--blue)}
.bk-count{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);font-size:13px;letter-spacing:.2em;color:var(--ink)}
.bk-shoplink{position:fixed;bottom:34px;left:50%;transform:translateX(-50%);font-size:12px;font-weight:700;letter-spacing:.16em;color:var(--ink);text-decoration:underline;text-underline-offset:4px;z-index:9002}
.bk-shoplink:hover{color:var(--blue)}
/* films theater */
#bk-films{max-width:1080px;margin:70px auto 0;padding:0 20px}
#bk-films h2{text-align:center;font-size:20px;font-weight:400;letter-spacing:.42em;text-indent:.42em;margin-bottom:28px}
.film-stage{position:relative;aspect-ratio:16/9;background:#000;overflow:hidden}
.film-stage img.poster{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.94}
.film-stage iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.film-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;gap:14px;background:none;border:none;cursor:pointer;color:#fff;font-family:inherit;font-size:19px;z-index:3}
.film-play .ring{width:58px;height:58px;border:2px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center}
.film-play .ring::after{content:"";border-style:solid;border-width:10px 0 10px 16px;border-color:transparent transparent transparent #fff;margin-left:4px}
.film-play span.lbl{text-decoration:underline;text-underline-offset:5px}
.film-play:hover span.lbl{color:var(--blue)}
.film-title{position:absolute;left:22px;bottom:16px;color:#fff;font-size:15px;letter-spacing:.08em;z-index:2;text-shadow:0 1px 8px rgba(0,0,0,.55)}
.film-arrow{position:absolute;top:50%;transform:translateY(-50%);background:none;border:none;font-size:46px;color:var(--ink);cursor:pointer;padding:12px;z-index:4}
.film-arrow:hover{color:var(--blue)}
.film-arrow.l{left:-64px}.film-arrow.r{right:-64px}
@media(max-width:1240px){.film-arrow.l{left:-14px;color:#fff}.film-arrow.r{right:-14px;color:#fff}}
.film-thumbs{display:flex;gap:12px;justify-content:center;margin-top:16px;flex-wrap:wrap}
.film-thumb{width:150px;aspect-ratio:16/9;padding:0;border:2px solid transparent;background:none;cursor:pointer}
.film-thumb img{width:100%;height:100%;object-fit:cover;display:block;opacity:.75;transition:opacity .2s}
.film-thumb:hover img{opacity:1}
.film-thumb.on{border-color:var(--blue)}
.film-thumb.on img{opacity:1}
/* theater mode */
body.theater{overflow:hidden}
#bk-dim{display:none;position:fixed;inset:0;background:rgba(20,19,18,.9);z-index:8000}
body.theater #bk-dim{display:block}
body.theater .film-stage{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);width:min(1200px,94vw);aspect-ratio:16/9;z-index:8001}
body.theater .film-arrow,body.theater .film-thumbs{visibility:hidden}
#bk-exit{display:none;position:fixed;top:18px;right:26px;z-index:8002;background:none;border:none;color:#fff;font-size:34px;cursor:pointer}
body.theater #bk-exit{display:block}
/* footer */
footer{max-width:1450px;margin:80px auto 0;padding:34px 48px 42px;display:flex;align-items:center;justify-content:space-between;gap:20px;font-size:13px;letter-spacing:.16em}
footer .bee img{width:50px;height:60px;object-fit:cover;display:block}

@media(max-width:620px){footer{flex-direction:column;text-align:center;padding:26px 20px 34px}}
