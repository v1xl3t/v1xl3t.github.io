:root{--cream:#F5EEE3;--ink:#31302D;--blue:#7FCCF7;--grey:#C4BEB6}
*{margin:0;padding:0;box-sizing:border-box}
html{scrollbar-gutter:stable}
body{background:var(--cream);color:var(--ink);font-family:proxima-n-w01-reg,proxima-n-w05-reg,sans-serif}
a{color:inherit;text-decoration:none}
header{position:relative;max-width:1450px;margin:0 auto;height:150px}
nav.bk-nav{position:absolute;left:48px;top:38px;display:flex;gap:26px;font-size:16px;font-weight:700;letter-spacing:.06em}
nav.bk-nav a{color:var(--ink)}
nav.bk-nav a.here{color:var(--blue)}
.bk-mark{position:absolute;left:50%;top:26px;transform:translateX(-50%)}
.bk-mark img{width:400px;max-width:56vw;height:auto;display:block}
.bk-account{position:absolute;right:48px;top:34px}
.bk-bag{display:block;width:26px;height:30px}
.bk-bag svg{width:100%;height:100%;stroke:var(--blue);fill:none;stroke-width:2}
footer{max-width:1450px;margin:80px auto 0;padding:34px 48px 42px;display:flex;align-items:center;justify-content:space-between;gap:20px;font-size:13px;letter-spacing:.16em}
footer .bee img{width:50px;height:60px;object-fit:cover;display:block}
footer a:hover{color:var(--blue)}
@media(max-width:640px){header{height:112px}nav.bk-nav{left:20px;top:20px}.bk-account{right:20px;top:18px}.bk-mark{top:58px}.bk-mark img{max-width:62vw}footer{flex-direction:column;text-align:center;padding:26px 20px 34px;margin-top:48px}}

.pdp{display:grid;grid-template-columns:76px minmax(0,1fr) minmax(300px,380px);gap:22px 34px;max-width:1180px;margin:4px auto 0;padding:0 24px;align-items:start}
.rail{display:flex;flex-direction:column;gap:10px;max-height:66vh;overflow-y:auto;scroll-behavior:smooth;scrollbar-width:none;min-width:0}
.rail::-webkit-scrollbar{display:none}
.rail img{width:100%;aspect-ratio:5/6;object-fit:contain;cursor:pointer;border:2px solid transparent;flex:none}
.rail img.on{border-color:var(--ink)}
.railnav{grid-column:1;display:flex;justify-content:center;margin-top:8px}
.railnav button{background:none;border:1px solid var(--ink);width:34px;height:26px;font-size:15px;cursor:pointer;color:var(--ink);margin:0 4px}
.railnav button:hover{color:var(--blue);border-color:var(--blue)}
.gal{min-width:0}
.mainwrap{overflow:hidden}
.main{width:100%;max-height:66vh;object-fit:contain;display:block;will-change:transform}
.inf h1{font-size:32px;letter-spacing:.02em;margin-bottom:8px}
.inf .price{font-size:22px;color:#625F5B;margin-bottom:16px}
.inf .desc{color:#625F5B;line-height:1.65;margin-bottom:18px;font-size:14px}
.inf .lab{font-size:12px;letter-spacing:.14em;color:#625F5B;margin:0 0 8px}
.swatches{display:flex;gap:12px;margin-bottom:18px}
.sw{width:26px;height:26px;border-radius:50%;border:1px solid rgba(49,48,45,.4);cursor:pointer;padding:0}
.sw.on{outline:2px solid var(--ink);outline-offset:3px}
.sizes{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.sz{min-width:44px;padding:9px 11px;text-align:center;border:1px solid var(--ink);background:none;font:13px proxima-n-w01-reg,sans-serif;color:var(--ink);cursor:pointer}
.sz.on{background:var(--ink);color:var(--cream)}
.sizes.err .sz{border-color:#c0392b}
.oneof{display:inline-block;border:1px solid var(--ink);padding:6px 12px;font-size:11px;letter-spacing:.2em;margin-bottom:20px}
.atc{width:100%;max-width:420px;background:#0e0e0e;color:#fff;border:none;padding:15px;font:700 15px/1 proxima-n-w01-reg,sans-serif;letter-spacing:.06em;cursor:pointer}
.atc:hover{background:#31302D}
.hint{font-size:12px;color:#c0392b;margin-top:8px;visibility:hidden}
.hint.on{visibility:visible}
@media(max-width:900px){
 .pdp{grid-template-columns:minmax(0,1fr);gap:18px}
 .rail{flex-direction:row;max-height:none;overflow-x:auto;overflow-y:hidden;order:2}
 .rail img{width:64px}
 .railnav{display:none}
 .gal{order:1}.inf{order:3}
 .main{max-height:56vh}.inf h1{font-size:26px}}

<script>
(function(){
var P={"n": "pOLO", "p": 80.0, "sized": true, "img": "/sweetcream/site/assets/3843f3_c79f522a93af454b9706d9459e176297~mv2.png"};
var CMAP={};
var main=document.querySelector('.main'),rail=document.querySelector('.rail');
var thumbs=[].slice.call(rail.querySelectorAll('img'));
function setMain(i){main.src=thumbs[i].src;thumbs.forEach(function(t,j){t.classList.toggle('on',j===i)});P.img=thumbs[i].src;
 thumbs[i].scrollIntoView({block:'nearest',inline:'nearest',behavior:'smooth'});}
thumbs.forEach(function(t,i){t.addEventListener('click',function(){setMain(i)})});
var rn=document.querySelectorAll('.railnav button');
if(rn.length){rn[0].onclick=function(){rail.scrollBy(0,-rail.clientHeight*0.7)};
 rn[1].onclick=function(){rail.scrollBy(0,rail.clientHeight*0.7)};
 addEventListener('load',function(){if(rail.scrollHeight<=rail.clientHeight+6)document.querySelector('.railnav').style.display='none'});}
// buttery zoom: rAF-lerped origin, scale on hover
var zx=50,zy=50,tx=50,ty=50,zoomed=false,raf=null;
function tick(){zx+=(tx-zx)*0.18;zy+=(ty-zy)*0.18;
 main.style.transformOrigin=zx+'% '+zy+'%';
 main.style.transform=zoomed?'scale(1.6)':'scale(1)';
 if(zoomed||Math.abs(tx-zx)>0.2||main.style.transform!=='scale(1)')raf=requestAnimationFrame(tick);else raf=null;}
function go(){if(!raf)raf=requestAnimationFrame(tick)}
document.querySelector('.mainwrap').style.overflow='hidden';
main.style.transition='transform .35s cubic-bezier(.22,.61,.36,1)';
main.addEventListener('mouseenter',function(){zoomed=true;go()});
main.addEventListener('mousemove',function(e){var r=main.getBoundingClientRect();
 tx=(e.clientX-r.left)/r.width*100;ty=(e.clientY-r.top)/r.height*100;go();});
main.addEventListener('mouseleave',function(){zoomed=false;go()});
// colorways: deterministic map from the original catalog
var color=null;
document.querySelectorAll('.sw').forEach(function(s){
 s.addEventListener('click',function(){
  document.querySelectorAll('.sw').forEach(function(x){x.classList.remove('on')});s.classList.add('on');
  color=s.dataset.name;
  if(CMAP[color]!==undefined)setMain(CMAP[color]);});});
var want=new URLSearchParams(location.search).get('color');
if(want){var m=[].slice.call(document.querySelectorAll('.sw')).filter(function(s){return s.dataset.name.toLowerCase()===want.toLowerCase()})[0];
 if(m)m.click();}
var size=null,sizesEl=document.querySelector('.sizes'),hintEl=document.querySelector('.hint');
if(sizesEl)sizesEl.addEventListener('click',function(e){var b=e.target.closest('.sz');if(!b)return;
 sizesEl.querySelectorAll('.sz').forEach(function(x){x.classList.remove('on')});b.classList.add('on');
 size=b.textContent.trim();sizesEl.classList.remove('err');if(hintEl)hintEl.classList.remove('on');});
document.querySelector('.atc').addEventListener('click',function(){
 if(P.sized&&!size){sizesEl.classList.add('err');if(hintEl)hintEl.classList.add('on');return;}
 var opts=[];if(size)opts.push('Size '+size);if(color)opts.push(color);
 SC.add({n:P.n,p:P.p,o:opts.join(' \u00b7 '),img:P.img});});
})();
</script>
