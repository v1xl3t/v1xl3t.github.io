:root{--cream:#F5EEE3;--ink:#31302D;--blue:#7FCCF7;--grey:#C4BEB6}
*{margin:0;padding:0;box-sizing:border-box}
html{scrollbar-gutter:stable}
body{background:var(--cream);color:var(--ink);font-family:proxima-n-w01-reg,proxima-n-w05-reg,sans-serif}
a{color:inherit;text-decoration:none}
header{position:relative;max-width:1450px;margin:0 auto;height:150px}
nav.bk-nav{position:absolute;left:48px;top:38px;display:flex;gap:26px;font-size:16px;font-weight:700;letter-spacing:.06em}
nav.bk-nav a{color:var(--ink)}
nav.bk-nav a.here{color:var(--blue)}
.bk-mark{position:absolute;left:50%;top:26px;transform:translateX(-50%)}
.bk-mark img{width:400px;max-width:56vw;height:auto;display:block}
.bk-account{position:absolute;right:48px;top:34px}
.bk-bag{display:block;width:26px;height:30px}
.bk-bag svg{width:100%;height:100%;stroke:var(--blue);fill:none;stroke-width:2}
footer{max-width:1450px;margin:80px auto 0;padding:34px 48px 42px;display:flex;align-items:center;justify-content:space-between;gap:20px;font-size:13px;letter-spacing:.16em}
footer .bee img{width:50px;height:60px;object-fit:cover;display:block}
footer a:hover{color:var(--blue)}
@media(max-width:640px){header{height:112px}nav.bk-nav{left:20px;top:20px}.bk-account{right:20px;top:18px}.bk-mark{top:58px}.bk-mark img{max-width:62vw}footer{flex-direction:column;text-align:center;padding:26px 20px 34px;margin-top:48px}}

.pdp{display:grid;grid-template-columns:minmax(0,7fr) minmax(300px,5fr);gap:52px;max-width:1180px;margin:8px auto 0;padding:0 24px;align-items:start}
.gal{min-width:0}
.gal .mainwrap{overflow:hidden;background:#fff}
.gal .main{width:100%;max-height:72vh;object-fit:contain;display:block;transition:transform .5s cubic-bezier(.22,.61,.36,1)}
.gal .strip{display:flex;gap:10px;margin-top:12px;overflow-x:auto;scroll-behavior:smooth;scrollbar-width:none}
.gal .strip::-webkit-scrollbar{display:none}
.gal .strip img{width:72px;height:86px;object-fit:cover;cursor:pointer;flex:none;border:2px solid transparent;background:#fff}
.gal .strip img.on{border-color:var(--ink)}
.gal .snav{display:flex;gap:8px;justify-content:center;margin-top:8px}
.gal .snav button{background:none;border:1px solid var(--ink);width:34px;height:28px;font-size:16px;cursor:pointer;color:var(--ink)}
.gal .snav button:hover{color:var(--blue);border-color:var(--blue)}
.inf h1{font-size:34px;letter-spacing:.02em;margin-bottom:10px}
.inf .price{font-size:24px;color:#625F5B;margin-bottom:22px}
.inf .desc{color:#625F5B;line-height:1.7;margin-bottom:24px}
.inf .lab{font-size:12px;letter-spacing:.14em;color:#625F5B;margin:0 0 8px}
.swatches{display:flex;gap:12px;margin-bottom:22px}
.sw{width:26px;height:26px;border-radius:50%;border:1px solid rgba(49,48,45,.4);cursor:pointer;padding:0}
.sw.on{outline:2px solid var(--ink);outline-offset:3px}
.sizes{display:flex;gap:10px;margin-bottom:26px;flex-wrap:wrap}
.sz{min-width:46px;padding:10px 12px;text-align:center;border:1px solid var(--ink);background:none;font:13px proxima-n-w01-reg,sans-serif;color:var(--ink);cursor:pointer}
.sz.on{background:var(--ink);color:var(--cream)}
.sizes.err .sz{border-color:#c0392b}
.oneof{display:inline-block;border:1px solid var(--ink);padding:6px 12px;font-size:11px;letter-spacing:.2em;margin-bottom:26px}
.atc{width:100%;max-width:420px;background:#0e0e0e;color:#fff;border:none;padding:16px;font:700 15px/1 proxima-n-w01-reg,sans-serif;letter-spacing:.06em;cursor:pointer}
.atc:hover{background:#31302D}
.hint{font-size:12px;color:#c0392b;margin-top:8px;visibility:hidden}
.hint.on{visibility:visible}
@media(max-width:900px){.pdp{grid-template-columns:minmax(0,1fr);gap:26px}.gal .main{max-height:58vh}.inf h1{font-size:27px}}

<script>
(function(){
var P={"n": "BEE", "p": 35.0, "sized": true, "img": "/sweetcream/site/assets/3843f3_e81ebd8d7ea04c52b4ac788d8268ad07~mv2.png"};
var main=document.querySelector('.gal .main'),strip=document.querySelector('.gal .strip');
var thumbs=[].slice.call(strip.querySelectorAll('img'));
function setMain(i){main.src=thumbs[i].src;thumbs.forEach(function(t,j){t.classList.toggle('on',j===i)});P.img=thumbs[i].src;}
thumbs.forEach(function(t,i){t.addEventListener('click',function(){setMain(i)})});
var nav=document.querySelectorAll('.gal .snav button');
nav[0].onclick=function(){strip.scrollBy(-strip.clientWidth*0.7,0)};
nav[1].onclick=function(){strip.scrollBy(strip.clientWidth*0.7,0)};
var wrap=document.querySelector('.gal .mainwrap');
main.addEventListener('mousemove',function(e){var r=main.getBoundingClientRect();
 main.style.transformOrigin=((e.clientX-r.left)/r.width*100)+'% '+((e.clientY-r.top)/r.height*100)+'%';
 main.style.transform='scale(1.6)';});
main.addEventListener('mouseleave',function(){main.style.transform='none'});
var color=null;
function avg(img){try{var c=document.createElement('canvas');c.width=c.height=12;var x=c.getContext('2d');
 x.drawImage(img,0,0,12,12);var d=x.getImageData(2,2,8,8).data,r=0,g=0,b=0,n=0;
 for(var i=0;i<d.length;i+=4){if(d[i]>242&&d[i+1]>242&&d[i+2]>242)continue;r+=d[i];g+=d[i+1];b+=d[i+2];n++;}
 return n?[r/n,g/n,b/n]:null}catch(e){return null}}
function hex2rgb(h){h=h.replace('#','');return [parseInt(h.substr(0,2),16),parseInt(h.substr(2,2),16),parseInt(h.substr(4,2),16)]}
document.querySelectorAll('.sw').forEach(function(s){
 s.addEventListener('click',function(){
  document.querySelectorAll('.sw').forEach(function(x){x.classList.remove('on')});s.classList.add('on');
  color=s.dataset.name;
  var rgb=hex2rgb(getComputedStyle(s).backgroundColor.match(/\d+/g)?'#'+getComputedStyle(s).backgroundColor.match(/\d+/g).slice(0,3).map(function(v){return (+v).toString(16).padStart(2,'0')}).join(''):'#ffffff');
  var best=-1,bd=1e9;
  thumbs.forEach(function(t,i){var a=avg(t);if(!a)return;
   var d=Math.pow(a[0]-rgb[0],2)+Math.pow(a[1]-rgb[1],2)+Math.pow(a[2]-rgb[2],2);
   if(d<bd){bd=d;best=i;}});
  if(best>=0)setMain(best);});});
var want=new URLSearchParams(location.search).get('color');
if(want){var m=[].slice.call(document.querySelectorAll('.sw')).filter(function(s){return s.dataset.name.toLowerCase()===want.toLowerCase()})[0];
 if(m)addEventListener('load',function(){setTimeout(function(){m.click()},250)});}
var size=null,sizesEl=document.querySelector('.sizes'),hintEl=document.querySelector('.hint');
if(sizesEl)sizesEl.addEventListener('click',function(e){var b=e.target.closest('.sz');if(!b)return;
 sizesEl.querySelectorAll('.sz').forEach(function(x){x.classList.remove('on')});b.classList.add('on');
 size=b.textContent.trim();sizesEl.classList.remove('err');if(hintEl)hintEl.classList.remove('on');});
document.querySelector('.atc').addEventListener('click',function(){
 if(P.sized&&!size){sizesEl.classList.add('err');if(hintEl)hintEl.classList.add('on');return;}
 var opts=[];if(size)opts.push('Size '+size);if(color)opts.push(color);
 SC.add({n:P.n,p:P.p,o:opts.join(' \u00b7 '),img:P.img});});
})();
</script>
