<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hi Kayla</title>
<style>
  :root{ --bg:#0a0b0f; --fg:#eef2f7; --accent:#7cc6ff; }
  *{ box-sizing:border-box; }
  html,body{ height:100%; margin:0; }
  body{
    display:grid; place-items:center; min-height:100%;
    background:
      radial-gradient(120% 90% at 50% 8%, rgba(124,198,255,.14), transparent 60%),
      var(--bg);
    color:var(--fg); text-align:center;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    padding:24px;
  }
  h1{
    margin:0; font-weight:800; letter-spacing:-.02em; line-height:1.05;
    font-size:clamp(3rem, 14vw, 8rem);
    background:linear-gradient(180deg, #fff, var(--accent));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    animation:rise .9s cubic-bezier(.2,.8,.2,1) both;
  }
  p{ margin:16px 0 0; color:#9aa6b4; font-size:clamp(.95rem,3.5vw,1.15rem);
     animation:rise .9s cubic-bezier(.2,.8,.2,1) .12s both; }
  @keyframes rise{ from{ opacity:0; transform:translateY(14px); } to{ opacity:1; transform:none; } }
  @media (prefers-reduced-motion: reduce){ h1,p{ animation:none; } }
</style>
</head>
<body>
  <main>
    <h1>Hi Kayla</h1>
    <p>✧</p>
  </main>
</body>
</html>
