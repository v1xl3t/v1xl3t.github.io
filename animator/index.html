<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animator — planned</title>
  <style>
    :root { --bg:#0e1116; --panel:#161b22; --border:#2a313c; --text:#d7dde5; --muted:#7d8794; --accent:#4c8dff; }
    * { box-sizing:border-box; } html,body { margin:0; height:100%; }
    body { background:var(--bg); color:var(--text); font:15px/1.6 ui-sans-serif,system-ui,sans-serif;
           display:grid; place-items:center; text-align:center; padding:24px; }
    .card { max-width:560px; background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:32px 28px; }
    h1 { margin:0 0 6px; font-size:28px; }
    .tag { color:var(--accent); font-weight:600; letter-spacing:.3px; }
    p { color:var(--muted); }
    a { color:var(--accent); }
  </style>
</head>
<body>
  <main class="card" role="main">
    <h1>Animator</h1>
    <p class="tag">3D keyframe animation — the CADence × Layerloop bridge</p>
    <p>Planned — part of Vi's creative suite. Roadmap in <code>ROADMAP.md</code>.
       Built standalone first, designed to snap into <a href="../studio/">Studio</a> later.
       Accessibility-first.</p>
  </main>

</html>
