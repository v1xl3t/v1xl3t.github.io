<!DOCTYPE html>
<html lang="en">
  <head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.2.0/p5.js"></script>
    <link rel="stylesheet" type="text/css" href="style.css">
    <meta charset="utf-8" />

  </head>
  <body>
    <div id="loading">
      <div class="walker" aria-hidden="true">🐢</div>
      <div class="trail" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i></div>
      <div>growing the L-system<span class="pulse">&hellip;</span></div>
    </div>
    <script src="sketch.js"></script>
    <div class="speed" aria-label="Animation speed">
      <button data-speed="1" onclick="primesSpeed.set(1, this)">1x</button>
      <button data-speed="2" onclick="primesSpeed.set(2, this)">2x</button>
      <button data-speed="3" class="on" onclick="primesSpeed.set(3, this)">3x</button>
    </div>
    <div class="cam-controls" aria-label="Camera controls">
      <button onclick="primesCam.zin()"  title="Zoom in">＋</button>
      <button onclick="primesCam.zout()" title="Zoom out">－</button>
      <button onclick="primesCam.home()" title="Fit the whole drawing">⌂</button>
    </div>
    <style>
      html, body { margin: 0; overflow: hidden; }
      canvas { display: block; touch-action: none; }
      .cam-controls {
        position: fixed; right: 14px; bottom: 14px; display: flex; flex-direction: column; gap: 8px;
      }
      .cam-controls button {
        width: 42px; height: 42px; border-radius: 12px; border: 1px solid #ccd;
        background: #ffffffee; color: #345; font-size: 18px; cursor: pointer;
        box-shadow: 0 3px 10px rgba(20,30,60,.15);
      }
      .cam-controls button:hover { background: #eef2ff; }
      .speed {
        position: fixed; left: 50%; bottom: 16px; transform: translateX(-50%);
        display: flex; gap: 4px; background: #ffffffee; border: 1px solid #ccd;
        border-radius: 12px; padding: 5px; box-shadow: 0 3px 10px rgba(20,30,60,.15);
      }
      .speed button {
        border: none; background: none; color: #678; font-size: 13px; font-weight: 700;
        padding: 6px 13px; border-radius: 8px; cursor: pointer;
      }
      .speed button:hover { background: #eef2ff; }
      .speed button.on { background: #4a7dd6; color: #fff; }
      #loading {
        position: fixed; inset: 0; display: flex; flex-direction: column; gap: 14px;
        align-items: center; justify-content: center;
        background: #fff; color: #678; font: 15px/1.4 -apple-system, "Segoe UI", sans-serif;
        letter-spacing: .04em; z-index: 50;
      }
      .walker { font-size: 34px; animation: waddle 1.1s ease-in-out infinite; }
      @keyframes waddle {
        0%, 100% { transform: translateX(-14px) rotate(-6deg); }
        50%      { transform: translateX(14px)  rotate(6deg) translateY(-4px); }
      }
      .trail { display: flex; gap: 9px; }
      .trail i {
        width: 7px; height: 7px; border-radius: 50%; background: #7fb3f5;
        animation: bloom 1.5s ease-in-out infinite;
      }
      .trail i:nth-child(2) { animation-delay: .15s }
      .trail i:nth-child(3) { animation-delay: .3s }
      .trail i:nth-child(4) { animation-delay: .45s }
      .trail i:nth-child(5) { animation-delay: .6s }
      @keyframes bloom { 0%, 100% { opacity: .25; transform: scale(.7); } 50% { opacity: 1; transform: scale(1.15); } }
      .pulse { animation: pulse 1s ease-in-out infinite; }
      @keyframes pulse { 50% { opacity: .25; } }
    </style>
  </body>
</html>
